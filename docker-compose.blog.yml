services:
  worker1:
    build: .
    container_name: guardant-worker-blog-1
    environment:
      - NODE_ENV=production
      - WORKER_ID=worker-${HOSTNAME:-blog}-1-${TIMESTAMP:-1753901234570}
      - OWNER_EMAIL=${OWNER_EMAIL:-moon.pl.kr@gmail.com}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - KEY_DIR=/keys
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./worker1-keys:/keys
      - ./worker1-cache:/cache
    restart: unless-stopped
    # Don't use host mode on blog server - it's on different server than GuardAnt
    networks:
      - worker-network

  worker2:
    build: .
    container_name: guardant-worker-blog-2
    environment:
      - NODE_ENV=production
      - WORKER_ID=worker-${HOSTNAME:-blog}-2-${TIMESTAMP:-1753901234571}
      - OWNER_EMAIL=${OWNER_EMAIL:-moon.pl.kr@gmail.com}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - KEY_DIR=/keys
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./worker2-keys:/keys
      - ./worker2-cache:/cache
    restart: unless-stopped
    networks:
      - worker-network

  worker3:
    build: .
    container_name: guardant-worker-blog-3
    environment:
      - NODE_ENV=production
      - WORKER_ID=worker-${HOSTNAME:-blog}-3-${TIMESTAMP:-1753901234572}
      - OWNER_EMAIL=${OWNER_EMAIL:-moon.pl.kr@gmail.com}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - KEY_DIR=/keys
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./worker3-keys:/keys
      - ./worker3-cache:/cache
    restart: unless-stopped
    networks:
      - worker-network

networks:
  worker-network:
    driver: bridge