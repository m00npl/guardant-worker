services:
  worker1:
    build: .
    container_name: guardant-worker-1
    environment:
      - NODE_ENV=production
      - WORKER_ID=worker-${HOSTNAME:-standalone}-1-${TIMESTAMP:-1753901234567}
      - OWNER_EMAIL=${OWNER_EMAIL:-moon.pl.kr@gmail.com}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - KEY_DIR=/keys
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./worker1-keys:/keys
      - ./worker1-cache:/cache
    restart: unless-stopped
    network_mode: host

  worker2:
    build: .
    container_name: guardant-worker-2
    environment:
      - NODE_ENV=production
      - WORKER_ID=worker-${HOSTNAME:-standalone}-2-${TIMESTAMP:-1753901234568}
