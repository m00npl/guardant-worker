version: '3.8'

services:
  worker:
    build: .
    container_name: guardant-worker
    environment:
      - NODE_ENV=production
      - WORKER_ID=${WORKER_ID}
      - OWNER_EMAIL=${OWNER_EMAIL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - KEY_DIR=/keys
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./.keys:/keys
      - ./.cache:/cache
    restart: unless-stopped
    networks:
      - guardant

networks:
  guardant:
    driver: bridge